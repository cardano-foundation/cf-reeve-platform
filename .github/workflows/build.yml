name: Build

on:
  push:
    branches:
      - main
      - develop
      - 'release/*'
    tags:
      - '[0-9]+.[0-9]+.[0-9]+*'
  pull_request:
    types: [ opened, synchronize ]
  workflow_dispatch:

env:
  PRIVATE_DOCKER_REGISTRY_URL: ${{ secrets.GITLAB_DOCKER_REGISTRY_URL }}
  PRIVATE_DOCKER_REGISTRY_USER: Deploy-Token
  PRIVATE_DOCKER_REGISTRY_PASS: ${{ secrets.GITLAB_PKG_REGISTRY_TOKEN }}
  GITLAB_MAVEN_REGISTRY_URL: ${{ secrets.GITLAB_MAVEN_REGISTRY_URL }}
  GITLAB_MAVEN_REGISTRY_PASS: ${{ secrets.GITLAB_MAVEN_REGISTRY_PASS }}
  MAVEN_CENTRAL_OSSRH_USERNAME: ${{ secrets.MAVEN_CENTRAL_OSSRH_USERNAME }}
  MAVEN_CENTRAL_OSSRH_TOKEN: ${{ secrets.MAVEN_CENTRAL_OSSRH_TOKEN }}
  DOCKER_PUSH: true

jobs:
  publish:
    permissions:
      contents: write
      packages: write
    runs-on: arc-runner-set 
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'

      - name: ⛮ cf-gha-baseline
        uses: cardano-foundation/cf-gha-workflows/./actions/cf-gha-baseline@main
        id: cf-gha-baseline
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PRIVATE_DOCKER_REGISTRY_URL: ${{ env.PRIVATE_DOCKER_REGISTRY_URL }}
          PRIVATE_DOCKER_REGISTRY_USER: ${{ env.PRIVATE_DOCKER_REGISTRY_USER }}
          PRIVATE_DOCKER_REGISTRY_PASS: ${{ env.PRIVATE_DOCKER_REGISTRY_PASS }}
          HUB_DOCKER_COM_USER: ${{ secrets.HUB_DOCKER_COM_USER }}
          HUB_DOCKER_COM_PASS: ${{ secrets.HUB_DOCKER_COM_PASS }}
          DOCKER_REGISTRIES: "${{ secrets.DOCKER_REGISTRIES }}"

      - name: GPG checks
        run: |
          which gpg
          gpg --version

      - name: Decode GPG Key
        run: |
          mkdir -p ~/.gradle/
          echo "${{ secrets.MAVEN_CENTRAL_GPG_KEY_BASE64 }}" > ~/.gradle/secring.gpg.b64
          base64 -d ~/.gradle/secring.gpg.b64 > ~/.gradle/secring.gpg
          echo "${{ secrets.MAVEN_CENTRAL_GPG_PASSPHRASE }}" | gpg --batch --yes --passphrase-fd 0 --import ~/.gradle/secring.gpg
          gpg --keyserver hkps://keys.openpgp.org --send-key BEFB6B63A980310BB92A65365E362818AF79A015

      - name: Gradle publish
        env:
          JRELEASER_GPG_KEYNAME: "BEFB6B63A980310BB92A65365E362818AF79A015"
          JRELEASER_GPG_PASSPHRASE: "${{ secrets.MAVEN_CENTRAL_GPG_PASSPHRASE }}"
          JRELEASER_MAVENCENTRAL_USERNAME: "${{ secrets.MAVEN_CENTRAL_OSSRH_USERNAME }}"
          JRELEASER_MAVENCENTRAL_PASSWORD: "${{ secrets.MAVEN_CENTRAL_OSSRH_TOKEN }}"
        run: |
          GRADLE_TARGETS="clean publish"
          case "${TRIGGERING_REF}" in 
            pr|branch)
              VERSION_PUBLISH=${DOCKER_VERSIONED_COMMIT_GHRUNID_TAG}
              ;;
            tag)
              VERSION_PUBLISH=${TAG_NAME}
              GRADLE_TARGETS="$GRADLE_TARGETS jreleaserDeploy"
              ;;
          esac
          ./gradlew $GRADLE_TARGETS -Pversion=${VERSION_PUBLISH} -x test 
          echo "VERSION_PUBLISH=$VERSION_PUBLISH" | tee -a $GITHUB_ENV

      - name:  🌍 earthly (docker build and push)
        run: |
          earthly +docker-publish \
            --PUSH=${DOCKER_PUSH} \
            --DOCKER_REGISTRIES="${{ env.DOCKER_REGISTRIES_FILTERED }}" \
            --DOCKER_IMAGES_EXTRA_TAGS="${EARTHLY_DOCKER_IMAGES_EXTRA_TAGS}"

      - name: Generate SBOM
        run: ./gradlew cyclonedxBom

      - name: Upload SBOM to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: build/reports/bom.xml

      - name: Build payload
        if: steps.cf-gha-baseline.outputs.TRIGGERING_REF == 'pr'
        id: payload
        run: |
          PAYLOAD=$(jq -n \
            --arg version "${VERSION_PUBLISH}" \
            --arg prName "${{ github.event.pull_request.title }}" \
            --arg sourceBranch "${{ github.event.pull_request.head.ref }}" \
            --arg targetBranch "${{ github.event.pull_request.base.ref }}" \
            '
              {
                "version": $version,
                "prName": $prName,
                "sourceBranch": $sourceBranch,
                "targetBranch": $targetBranch 
              }')
          echo 'PAYLOAD<<EOF' | tee -a ${GITHUB_ENV} | tee -a ${GITHUB_OUTPUT}
          echo "$PAYLOAD" | tee -a ${GITHUB_ENV} | tee -a ${GITHUB_OUTPUT}
          echo EOF | tee -a ${GITHUB_ENV} | tee -a ${GITHUB_OUTPUT}

      - name: Dispatch successful build event to private repo
        uses: cardano-foundation/cf-gha-workflows/./actions/cf-gha-dispatch-event@main
        if: steps.cf-gha-baseline.outputs.TRIGGERING_REF == 'pr'
        with:
          EVENT_TYPE: cf-reeve-platform-pr
          GITHUB_TOKEN: ${{ secrets.CF_REEVE_APPLICATION_REPO_PAT }}
          GITHUB_REPO: cardano-foundation/cf-reeve-application
          TRIGGERING_REF: ${{ steps.cf-gha-baseline.outputs.TRIGGERING_REF }}
          TRIGGERING_EVENT: ${{ github.event_name }}
          TRIGGERING_BRANCH: ${{ steps.cf-gha-baseline.outputs.BRANCH_NAME }}
          TRIGGERING_TAG: ${{ steps.cf-gha-baseline.outputs.TAG_NAME }}
          TRIGGERING_GHRUNID: ${{ github.run_id }}
          GIT_SHORT_COMMIT: ${{ steps.cf-gha-baseline.outputs.GIT_SHORT_COMMIT }}
          TRIGGERING_PAYLOAD: "${{ steps.payload.outputs.PAYLOAD }}"
